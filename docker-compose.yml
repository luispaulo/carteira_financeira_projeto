version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cobuccio-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - postgres
    networks:
      - cobuccio-network

  nginx:
    image: nginx:alpine
    container_name: cobuccio-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cobuccio-network

  postgres:
    image: postgres:16
    container_name: cobuccio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cobucciodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cobuccio-network

  adminer:
    image: adminer
    container_name: cobuccio-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - cobuccio-network

networks:
  cobuccio-network:

volumes:
  postgres_data: